<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Leagues – Purity | Gold Universe</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; margin: 40px; background: #0f172a; color: #e2e8f0; }
    h1 { color: #facc15; }
    table { border-collapse: collapse; width: 100%; margin-top: 20px; background: #1e2937; border-radius: 8px; overflow: hidden; }
    th, td { border: 1px solid #334155; padding: 12px 16px; text-align: left; }
    th { background: #1e2937; color: #facc15; }
    tr:nth-child(even) { background: #273549; }
    .muted { color: #64748b; font-size: 0.9em; }
    #status { margin: 20px 0; padding: 12px; background: #1e2937; border-radius: 6px; }
  </style>
</head>
<body>
  <h1>🏆 League Purity Ranking</h1>
  <p class="muted">Live from <code>/api/leagues</code> • Powered by Wilson lower 95% bound</p>
  <div id="status">Loading league data…</div>
  <table id="tbl" stplay:none">
    <thead>
      <tr>
        <th>League</th>
        <th>Graded</th>
        <th>Hits</th>
        <th>Hit Rate</th>
        <th>Wilson Lower 95%</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

<script>
async function loadLeagues() {
  try {
    const url = "/api/leagues?use_cache=true&cache_only=true&max_sats=0&min_graded=1";
    const res = await fetch(url);
    const data = await res.json();
    
    document.getElementById("status").innerHTML = `
      <strong>${(data.leagues || []).length}</strong> leagues • 
      ${data.satellites_used} satellites used • 
      <span style="color:#facc15">${new Date(data.timestamp || Date.now()).toLocaleString()}</span>
    `;
    
    const tbody = document.querySelector("#tbl tbody");
    tbinnerHTML = "";
    
    for (const r of (data.leagues || [])) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${r.league}</strong></td>
        <td>${r.graded}</td>
        <td>${r.hits}</td>
        <td>${(r.hit_rate ?? 0).toFixed(3)}</td>
        <td style="font-weight:600; color:#facc15">${(r.wilson_lower_95 ?? 0).toFixed(3)}</td>
      `;
      tbody.appendChild(tr);
    }
    document.getElementById("tbl").style.display = "table";
  } catch (err) {
    document.getElementById("status").innerHTML = `❌ Failed to load: ${err.message}`;
  }
}
loadLeagues();
</script>
</body>
</html>
